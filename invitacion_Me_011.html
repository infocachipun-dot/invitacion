<script>

var f=new Date("2026-03-10T12:30:00").getTime();

setInterval(function(){

var d=f-new Date().getTime();

if(d<=0){
contador.innerHTML="¡Es hoy!";
return;
}

var D=Math.floor(d/864e5),
H=Math.floor(d%864e5/36e5),
M=Math.floor(d%36e5/6e4),
S=Math.floor(d%6e4/1e3);

contador.innerHTML=D+"d "+H+"h "+M+"m "+S+"s";

},1000);
